<fieldset>
  <legend><h1>{{ question.question_text }}</h1></legend>

  <ul>
    {% for choice in question.choices.all %}
    <li>
      {{ choice.choice_text }} -- {{ choice.votes }}
      vote{{choice.votes|pluralize}}
    </li>
    {% endfor %}
  </ul>
</fieldset>

<a href="{% url 'core:detail' question.id %}">Vote again?</a>
